<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🤚 隔空跳一跳</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: calc(env(safe-area-inset-top, 20px) + 10px);
        }
        .score-container {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 6px 18px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .score-label { color: rgba(255,255,255,0.7); font-size: clamp(12px, 2.5vw, 14px); letter-spacing: 1px; }
        .score-value { color: #ffaa44; font-size: clamp(32px, 8vw, 48px); font-weight: 800; line-height: 1; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        /* 底部进度条和状态 */
        .bottom-ui {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 20px) + 10px);
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            z-index: 10;
        }
        .power-bar-container {
            width: 80%;
            max-width: 400px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
        }
        .power-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffaa44, #ff6600);
            border-radius: 20px;
            transition: width 0.03s linear;
        }
        .status-text {
            text-align: center;
            color: white;
            font-size: clamp(12px, 3vw, 16px);
            font-weight: 500;
            text-shadow: 0 1px 3px black;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 20px;
            border-radius: 40px;
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 启动按钮 */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            color: white;
            border: none;
            padding: clamp(12px, 2.5vw, 16px) clamp(24px, 5vw, 36px);
            font-size: clamp(18px, 4vw, 22px);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: auto;
            transition: 0.2s;
        }
        #start-btn:hover { background: #ffaa44; color: #1e2a3a; transform: translate(-50%, -50%) scale(1.02); }
        #start-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* 重置按钮 */
        #reset-btn {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 10px);
            right: 15px;
            width: clamp(42px, 8vw, 48px);
            height: clamp(42px, 8vw, 48px);
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #reset-btn:hover { background: #ffaa44; color: black; transform: rotate(30deg); }
        #reset-btn.game-over-pos {
            top: auto;
            bottom: calc(env(safe-area-inset-bottom, 20px) + 80px);
            right: auto;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            font-size: 20px;
            z-index: 30;
        }

        /* 加载动画 */
        .loading-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 30;
            pointer-events: none;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #ffaa44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: white;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: clamp(14px, 3vw, 16px);
            white-space: nowrap;
        }

        .debug-dist {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: black;
            color: lime;
            font-family: monospace;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 20;
            display: none; /* 手机上默认隐藏，如需调试可改为 block */
        }
    </style>
</head>
<body>
    <div id="game-ui">
        <div class="score-container">
            <div class="score-label">当前得分</div>
            <div class="score-value" id="scoreValue">0</div>
        </div>
    </div>

    <div class="bottom-ui">
        <div class="power-bar-container">
            <div class="power-bar-fill" id="powerFill"></div>
        </div>
        <div class="status-text" id="statusMsg">🤚 点击下方按钮启动</div>
    </div>

    <button id="start-btn">🎥 启动游戏 & 摄像头</button>
    <button id="reset-btn">⟳</button>
    <div class="debug-dist" id="debugDist">0.000</div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">正在加载手势识别…</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/+esm"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

        // ---------- 音频管理器 ----------
        class AudioManager {
            constructor() { this.audioCtx = null; this.enabled = false; }
            async init() {
                if (this.audioCtx) return;
                try {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    await this.audioCtx.resume();
                    this.enabled = true;
                } catch (e) { console.warn('音频初始化失败:', e); this.enabled = false; }
            }
            _playTone(freq, duration, vol = 0.3) {
                if (!this.enabled || !this.audioCtx) return;
                try {
                    const now = this.audioCtx.currentTime;
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(this.audioCtx.destination);
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
                    osc.start(now);
                    osc.stop(now + duration);
                } catch (e) {}
            }
            playJump() { this._playTone(800, 0.3, 0.3); }
            playLand() { this._playTone(200, 0.2, 0.25); }
            playSuccess() { this._playTone(880, 0.15, 0.2); }
            playMiss() { this._playTone(120, 0.25, 0.2); }
            playGameOver() { this._playTone(150, 0.5, 0.3); }
            playDeathFall() { this._playTone(120, 1.0, 0.7); }
        }

        // ---------- 游戏配置 ----------
        const GRAVITY = -12;
        const JUMP_VY = 5.6;
        const MAX_HORIZ_SPEED = 3.8;
        const PLAYER_SIZE = 0.6;
        const PLATFORM_Y = -1.2;
        const PLATFORM_THICKNESS = 0.2;
        const PLATFORM_TOP = PLATFORM_Y + PLATFORM_THICKNESS / 2;
        const DEATH_Y = -2.5;
        const FALL_DEATH_Y = -6.0;
        const PINCH_DIST = 0.12;
        const OPEN_DIST = 0.15;
        const MAX_CHARGE_TIME = 1200;

        let score = 0;
        let gameOver = false;
        let canJump = true;
        let isCharging = false;
        let chargeStartTime = 0;
        let power = 0;

        let player = { x: 0, y: PLATFORM_TOP + PLAYER_SIZE/2, vx: 0, vy: 0, isOnGround: true };
        let currentPlatform = null, nextPlatform = null;
        let scene, camera, renderer, playerMesh;
        let handLandmarker, video, webcamRunning = false;
        let lastVideoTime = -1, lastPinchState = false;

        const scoreSpan = document.getElementById('scoreValue');
        const powerFill = document.getElementById('powerFill');
        const statusDiv = document.getElementById('statusMsg');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const debugDistSpan = document.getElementById('debugDist');
        const loadingOverlay = document.getElementById('loadingOverlay');
        let audio = new AudioManager();

        function updatePowerBar() { powerFill.style.width = (power * 100) + '%'; }
        function setStatus(msg, durationMs = 0) {
            statusDiv.innerText = msg;
            if (durationMs > 0) {
                clearTimeout(setStatus._timeout);
                setStatus._timeout = setTimeout(() => {
                    if (!gameOver && canJump && player.isOnGround) statusDiv.innerText = "🤏 捏住蓄力 → 张开跳跃";
                }, durationMs);
            }
        }
        function moveResetBtnToGameOver() { resetBtn.classList.add('game-over-pos'); }
        function moveResetBtnToCorner() { resetBtn.classList.remove('game-over-pos'); }

        function createPlatformMesh(x, y, size, color) {
            const geo = new THREE.BoxGeometry(size, PLATFORM_THICKNESS, size);
            const mat = new THREE.MeshStandardMaterial({ color, roughness:0.2, metalness:0.7, transparent:true, opacity:0.9 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, 0);
            mesh.receiveShadow = true; mesh.castShadow = true;
            scene.add(mesh);
            return mesh;
        }
        function destroyPlatformMesh(mesh) {
            if (mesh && mesh.parent) {
                scene.remove(mesh);
                if (mesh.geometry) mesh.geometry.dispose();
                if (mesh.material) mesh.material.dispose();
            }
        }
        function generateNextPlatform() {
            const dist = 1.2 + Math.random() * 1.4;
            const nextX = currentPlatform.x + dist;
            const width = 0.9 + Math.random() * 0.6;
            const mesh = createPlatformMesh(nextX, PLATFORM_Y, width, 0xffaa66);
            if (nextPlatform?.mesh?.parent) destroyPlatformMesh(nextPlatform.mesh);
            nextPlatform = { x: nextX, width, mesh };
            const orig = mesh.material.emissiveIntensity || 0;
            mesh.material.emissiveIntensity = 0.8;
            setTimeout(() => { if (mesh.material) mesh.material.emissiveIntensity = orig; }, 300);
        }
        function advanceToNextPlatform() {
            if (currentPlatform?.mesh) destroyPlatformMesh(currentPlatform.mesh);
            if (nextPlatform) {
                currentPlatform = { x: nextPlatform.x, width: nextPlatform.width, mesh: nextPlatform.mesh };
                if (currentPlatform.mesh?.material) {
                    currentPlatform.mesh.material.color.setHex(0x66ccff);
                    currentPlatform.mesh.material.emissiveIntensity = 0.2;
                }
            }
            nextPlatform = null;
            generateNextPlatform();
        }
        function doJump() {
            if (!canJump || gameOver || !player.isOnGround) return false;
            player.vx = power * MAX_HORIZ_SPEED;
            player.vy = JUMP_VY;
            player.isOnGround = false;
            canJump = false; isCharging = false; power = 0;
            updatePowerBar();
            if (navigator.vibrate) navigator.vibrate(30);
            audio.playJump();
            return true;
        }
        function checkLanding() {
            if (gameOver || !nextPlatform) { triggerGameOver(); return; }
            const left = nextPlatform.x - nextPlatform.width/2;
            const right = nextPlatform.x + nextPlatform.width/2;
            const tol = 0.08;
            if (player.x > left - tol && player.x < right + tol) {
                score++; scoreSpan.innerText = score;
                audio.playSuccess();
                advanceToNextPlatform();
                canJump = true; player.vx = 0; player.vy = 0;
                player.x = currentPlatform.x; player.y = PLATFORM_TOP + PLAYER_SIZE/2;
                player.isOnGround = true;
                if (playerMesh.material) { playerMesh.material.emissiveIntensity = 0.6; playerMesh.material.color.setHex(0xff8844); }
                setTimeout(() => { if (playerMesh.material && !gameOver) playerMesh.material.emissiveIntensity = 0.2; }, 150);
                if (navigator.vibrate) navigator.vibrate(20);
                setStatus("✅ 成功！继续蓄力跳跃", 800);
            } else { triggerGameOver(); }
        }
        function triggerGameOver() {
            if (gameOver) return;
            gameOver = true; canJump = false; isCharging = false; power = 0;
            updatePowerBar();
            audio.playMiss();
            audio.playGameOver();
            audio.playDeathFall();
            setStatus("💀 游戏结束 点击重置 💀");
            moveResetBtnToGameOver();
            if (playerMesh.material) { playerMesh.material.color.setHex(0xaa4444); playerMesh.material.emissiveIntensity = 0.3; }
            if (player.isOnGround) { player.vy = -1.5; player.isOnGround = false; }
            if (navigator.vibrate) navigator.vibrate([50,50,100]);
        }
        function updatePhysics(deltaTime) {
            if (gameOver) {
                if (player.y > FALL_DEATH_Y) {
                    player.vy += GRAVITY * deltaTime;
                    player.y += player.vy * deltaTime;
                    player.x += player.vx * deltaTime;
                    playerMesh.position.set(player.x, player.y, 0);
                    playerMesh.rotation.x += 0.05; playerMesh.rotation.z += 0.03;
                } else { playerMesh.visible = false; }
                return;
            }
            if (player.isOnGround) {
                player.vy = 0; player.y = PLATFORM_TOP + PLAYER_SIZE/2;
                player.vx = 0; player.x = currentPlatform ? currentPlatform.x : player.x;
            } else {
                player.vy += GRAVITY * deltaTime;
                player.y += player.vy * deltaTime;
                player.x += player.vx * deltaTime;
                const playerBottom = player.y - PLAYER_SIZE/2;
                if (player.vy < 0 && playerBottom <= PLATFORM_TOP + 0.06) {
                    player.y = PLATFORM_TOP + PLAYER_SIZE/2;
                    player.vy = 0; player.vx = 0;
                    player.isOnGround = true;
                    audio.playLand();
                    checkLanding();
                }
            }
            if (!gameOver && (player.y < DEATH_Y || player.x < -3)) triggerGameOver();
            if (player.x < -2.5) player.x = -2.5;
            playerMesh.position.set(player.x, player.y, 0);
            if (isCharging && !gameOver && player.isOnGround && canJump) {
                const scaleY = 1 - power * 0.35;
                playerMesh.scale.set(1, Math.max(0.5, scaleY), 1);
                if (playerMesh.material) playerMesh.material.emissiveIntensity = 0.4 + power * 1.2;
            } else if (!gameOver) {
                playerMesh.scale.set(1,1,1);
                if (playerMesh.material && playerMesh.material.emissiveIntensity > 0.25) playerMesh.material.emissiveIntensity *= 0.9;
            }
        }
        function initThree() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x0a1030); scene.fog = new THREE.FogExp2(0x0a1030, 0.008);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(5,6,10); camera.lookAt(0, -0.6, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight); renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0x404060));
            const dir = new THREE.DirectionalLight(0xffffff,1.2); dir.position.set(3,8,2); dir.castShadow = true;
            dir.shadow.mapSize.width = 512; dir.shadow.mapSize.height = 512; scene.add(dir);
            scene.add(new THREE.PointLight(0x4466cc,0.4)).position.set(-2,3,4);
            const grid = new THREE.GridHelper(20,20,0x88aaff,0x335588); grid.position.y = -1.6;
            grid.material.transparent = true; grid.material.opacity = 0.4; scene.add(grid);
            const geo = new THREE.BoxGeometry(PLAYER_SIZE, PLAYER_SIZE, PLAYER_SIZE);
            const mat = new THREE.MeshStandardMaterial({ color:0xff8844, emissive:0x442200, roughness:0.3, metalness:0.1 });
            playerMesh = new THREE.Mesh(geo, mat); playerMesh.castShadow = true; playerMesh.receiveShadow = true; scene.add(playerMesh);
            const initMesh = createPlatformMesh(0, PLATFORM_Y, 1.2, 0x66ccff);
            currentPlatform = { x:0, width:1.2, mesh:initMesh };
            generateNextPlatform();
        }
        async function startHandTracking() {
            await audio.init();
            const stream = await navigator.mediaDevices.getUserMedia({ video:{ width:640, height:480, facingMode:'user' } });
            video = document.createElement('video'); video.srcObject = stream; video.autoplay = true; video.playsInline = true;
            video.style.cssText = 'position:absolute; top:-1000px; left:-1000px;';
            document.body.appendChild(video);
            await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task", delegate:"GPU" },
                runningMode:"VIDEO", numHands:1
            });
            webcamRunning = true; setStatus("🤏 捏住手指蓄力 → 张开跳跃"); predictWebcam();
        }
        function predictWebcam() {
            if (!webcamRunning || !handLandmarker) { requestAnimationFrame(predictWebcam); return; }
            const now = video.currentTime;
            if (now !== lastVideoTime && video.readyState >= 2) {
                lastVideoTime = now;
                try {
                    const results = handLandmarker.detectForVideo(video, performance.now());
                    if (results.landmarks?.length) {
                        const lm = results.landmarks[0];
                        const dist = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y, lm[4].z-lm[8].z);
                        debugDistSpan.innerText = dist.toFixed(3);
                        const pinch = dist < PINCH_DIST;
                        const nowMs = Date.now();
                        if (!gameOver && player.isOnGround && canJump) {
                            if (!lastPinchState && pinch) { isCharging = true; chargeStartTime = nowMs; power = 0; updatePowerBar(); setStatus("⚡ 蓄力中... 保持捏合"); }
                            else if (isCharging && pinch) { power = Math.min(1, (nowMs-chargeStartTime)/MAX_CHARGE_TIME); updatePowerBar(); if(power>=0.99) setStatus("💥 满蓄力！快张开跳跃"); }
                            else if (isCharging && !pinch && dist > OPEN_DIST) { if(doJump()) setStatus("🚀 跳跃！",500); }
                            else if (isCharging && !pinch && dist <= OPEN_DIST) { isCharging = false; power = 0; updatePowerBar(); setStatus("🤏 捏住蓄力 → 张开跳跃"); }
                        } else {
                            if (isCharging) { isCharging = false; power = 0; updatePowerBar(); }
                            if (gameOver && statusDiv.innerText.indexOf('游戏结束')===-1) { setStatus("💀 游戏结束 点击重置 💀"); moveResetBtnToGameOver(); }
                        }
                        lastPinchState = pinch;
                    } else {
                        debugDistSpan.innerText = "无手";
                        if (isCharging) { isCharging = false; power = 0; updatePowerBar(); if(!gameOver) setStatus("🤏 捏住蓄力 → 张开跳跃"); }
                        lastPinchState = false;
                    }
                } catch(e) { console.warn('手势帧错误:', e); }
            }
            requestAnimationFrame(predictWebcam);
        }
        function resetGame() {
            gameOver = false; score = 0; scoreSpan.innerText = "0"; canJump = true;
            isCharging = false; power = 0; updatePowerBar(); lastPinchState = false;
            player = { x:0, y:PLATFORM_TOP+PLAYER_SIZE/2, vx:0, vy:0, isOnGround:true };
            playerMesh.position.set(0, player.y, 0); playerMesh.scale.set(1,1,1); playerMesh.rotation.set(0,0,0); playerMesh.visible = true;
            if(playerMesh.material) { playerMesh.material.color.setHex(0xff8844); playerMesh.material.emissiveIntensity = 0.2; }
            if(currentPlatform?.mesh) destroyPlatformMesh(currentPlatform.mesh);
            if(nextPlatform?.mesh) destroyPlatformMesh(nextPlatform.mesh);
            nextPlatform = null; currentPlatform = null;
            const initMesh = createPlatformMesh(0, PLATFORM_Y, 1.2, 0x66ccff);
            currentPlatform = { x:0, width:1.2, mesh:initMesh }; generateNextPlatform();
            camera.position.set(5,4.5,7); camera.lookAt(0,0,0);
            setStatus("🤏 捏住手指蓄力 → 张开跳跃"); moveResetBtnToCorner();
        }
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now-lastTime)/1000); if(delta<=0) delta = 0.016;
            lastTime = now; updatePhysics(delta);
            camera.position.x += ((player.x*0.4) - camera.position.x) * 0.06;
           camera.lookAt(player.x, player.y * 0.5 + 0.2, 0);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        let gameStarted = false;
        startBtn.addEventListener('click', async () => {
            if(gameStarted) return;
            startBtn.disabled = true;
            startBtn.innerText = "⏳ 启动中...";
            // 显示加载动画
            loadingOverlay.classList.add('active');
            try {
                await startHandTracking();
                gameStarted = true;
                startBtn.style.display = 'none';
                resetGame();
                setStatus("🤏 捏住手指蓄力 → 张开跳跃");
            } catch(err) {
                console.error(err);
                setStatus("❌ 摄像头启动失败，请检查权限并刷新页面");
                startBtn.disabled = false;
                startBtn.innerText = "🔄 重试";
                startBtn.style.display = 'block';
            } finally {
                // 隐藏加载动画
                loadingOverlay.classList.remove('active');
            }
        });
        resetBtn.addEventListener('click', () => { if(gameStarted) resetGame(); });
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        document.addEventListener('touchmove', e => { if(e.target !== startBtn && e.target !== resetBtn) e.preventDefault(); }, {passive: false});
        initThree(); animate();
        console.log('🤚 已适配手机 + 加载动画');
    </script>
</body>
</html>
